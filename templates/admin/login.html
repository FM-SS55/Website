<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Anchorline</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
<style>
  body{display:flex; align-items:center; justify-content:center; min-height:100vh;}
  .login-box{width:100%; max-width:380px; padding:40px; border:1px solid var(--line); background:var(--white);}
  .error{color:#B3261E; font-size:14px; margin-bottom:16px; font-family:var(--mono);}
</style>
</head>
<body>
  <div class="login-box crosshair">
    <div class="eyebrow">ADMIN</div>
    <h2 style="margin-bottom:24px;">Sign in</h2>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form action="{{ url_for('admin.login') }}" method="POST">
      <div class="field">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
  </div>
</body>
</html>
