# deploy/nginx.conf
#
# Reverse proxy: public internet (port 80) -> Node app (port 3000, localhost only).
#
# SETUP (one-time, on the Lightsail server):
#   1. Replace "yourdomain.com" below with your real domain (twice).
#   2. sudo cp deploy/nginx.conf /etc/nginx/sites-available/pulizia
#   3. sudo ln -s /etc/nginx/sites-available/pulizia /etc/nginx/sites-enabled/
#   4. sudo rm -f /etc/nginx/sites-enabled/default   # remove the default placeholder site
#   5. sudo nginx -t                                  # test config
#   6. sudo systemctl restart nginx
#   7. (recommended) sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
#      This adds HTTPS automatically and rewrites this file to redirect 80 -> 443.

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Allow larger uploads for banner/blog images from the admin panel (matches MAX_UPLOAD_MB in .env)
    client_max_body_size 10M;

    # Serve static assets directly via Nginx for speed, bypassing Node
    location /css/ { alias /var/www/pulizia-fm/public/css/; expires 30d; access_log off; }
    location /js/  { alias /var/www/pulizia-fm/public/js/;  expires 30d; access_log off; }
    location /images/ { alias /var/www/pulizia-fm/public/images/; expires 30d; access_log off; }
    location /favicon.ico { alias /var/www/pulizia-fm/public/favicon.ico; access_log off; }

    # Everything else (pages, admin, API, form submissions) -> Node app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}